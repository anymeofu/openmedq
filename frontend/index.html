    <!-- Canonical URL Redirect for www and http variations -->
    <script>
      (function() {
        var hostname = window.location.hostname;
        var protocol = window.location.protocol;
        var isLocal = hostname.includes('localhost') || hostname.includes('127.0.0.1') || hostname.includes('.local');
        if (!isLocal && (hostname === 'www.openmedq.com' || protocol === 'http:')) {
          window.location.replace('https://openmedq.com' + window.location.pathname + window.location.search + window.location.hash);
        }
      })();
    </script>
